    <text x="40" y="106" xml:space="preserve">в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ</text>
    <text x="40" y="120" xml:space="preserve">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в•ҡв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
    <text x="40" y="134" xml:space="preserve">в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ   в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘</text>
    <text x="40" y="148" xml:space="preserve">в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘</text>
    <text x="40" y="162" xml:space="preserve">в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қ</text>
  </g>

  <!-- bottom hex glyphs (cyan) -->
  <text x="40" y="200" fill="#00F5FF" filter="url(#cyanGlow)" xml:space="preserve">         в¬Ў          в¬Ў          в¬Ў          в¬Ў          в¬Ў</text>

  <!-- status block frame + body (pale lavender, with colored tspans for numbers + hex code) -->
  <g fill="#B5A0E6">
    <text x="40" y="244" xml:space="preserve">в”Ңв”Җ[ status ]в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ</text>
    <text x="40" y="264" xml:space="preserve">в”Ӯ                                                      в”Ӯ</text>
    <text x="40" y="284" xml:space="preserve">в”Ӯ   skills <tspan fill="#39FF14">39</tspan>  в—ү  agents <tspan fill="#39FF14">25</tspan>  в—ү  memory <tspan fill="#39FF14">54</tspan>              в”Ӯ</text>
    <text x="40" y="304" xml:space="preserve">в”Ӯ   hooks   <tspan fill="#39FF14">9</tspan>  в—ү  rules  <tspan fill="#39FF14">12</tspan>  в—ү  build  <tspan fill="#FF006E">0xFF006E</tspan>        в”Ӯ</text>
    <text x="40" y="324" xml:space="preserve">в”Ӯ                                                      в”Ӯ</text>
    <text x="40" y="344" xml:space="preserve">в”Ӯ   <tspan fill="#00F5FF">&gt;</tspan> boot. dispatch. exit through <tspan fill="#FF006E">hex</tspan>.                в”Ӯ</text>
    <text x="40" y="364" xml:space="preserve">в”Ӯ                                                      в”Ӯ</text>
    <text x="40" y="384" xml:space="preserve">в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ</text>
  </g>

  <!-- subtle scanline rule at the bottom for synthwave deck vibe -->
  <line x1="40" y1="420" x2="700" y2="420" stroke="#FF006E" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="370" y="438" fill="#5D2A8A" font-size="10" text-anchor="middle" xml:space="preserve">claude code agent system  В·  skills В· agents В· rules В· hooks В· memory</text>
</svg>
