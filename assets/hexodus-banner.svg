<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 460" font-family="'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace" font-size="14">
  <defs>
    <linearGradient id="hexodusBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="60%" stop-color="#0A0014"/>
      <stop offset="100%" stop-color="#05000F"/>
    </linearGradient>
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="740" height="460" fill="url(#hexodusBg)"/>

  <!-- top hex glyphs (cyan, dispatched agents) -->
  <text x="40" y="50" fill="#00F5FF" filter="url(#cyanGlow)" xml:space="preserve">         в¬Ў          в¬Ў          в¬Ў          в¬Ў          в¬Ў</text>

